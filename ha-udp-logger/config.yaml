name: "UDP Log Collector"
version: "1.0.2"
slug: "udp_log_collector"
description: "Сбор UDP логов с ротацией"
url: "https://github.com/sclsat/HA_repo/tree/main/ha-udp-logger"
arch:
  - armhf
  - armv7
  - aarch64
  - amd64
  - i386
startup: "application"
boot: "auto"
host_network: true
ports:
  45678/udp: 45678
ports_description:
  45678/udp: "UDP port for log collection"
options:
  log_dir: "/data/logs"
  max_size_mb: 10
  rotate_count: 5
  log_level: "info"
schema:
  log_dir: "str"
  max_size_mb: "int(1,100)"
  rotate_count: "int(1,20)"
  log_level: "list(debug|info|warning|error)"
map:
  - config:rw
  - share:rwssl:ro
